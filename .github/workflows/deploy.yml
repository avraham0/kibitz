name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # The bundled src/ modules (e.g. src/api/lichess.ts) import chess.js and resolve
      # it from the ROOT node_modules, so install root deps too — not just web/.
      - name: Install root dependencies
        run: npm ci
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      # vite build (esbuild) — skips full tsc typecheck, which needs @types/node from
      # the hoisted root install that isn't present in this web-only CI install.
      - name: Build (GitHub Pages base path)
        working-directory: web
        run: npx vite build
        env:
          GH_PAGES: 'true'
      - name: Disable Jekyll processing
        run: touch web/dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
